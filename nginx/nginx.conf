worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 上传大小限制（50MB 文档上传）
    client_max_body_size 50m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Docker 内置 DNS：让 nginx 按需动态解析上游容器，
    # 避免 backend/frontend 容器重建换 IP 后 nginx 仍用旧 IP 导致 502。
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name localhost;
        charset utf-8;

        # 上游地址用变量保存：配合 resolver 实现每次（按 valid 周期）重新解析，
        # proxy_pass 不带 URI 路径 → 原样透传请求路径（与原 upstream 写法行为一致）。
        set $backend_upstream  backend:8080;
        set $frontend_upstream frontend:80;

        # 前端静态资源代理
        location / {
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 后端 API 代理
        location /api/ {
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE 流式响应代理（关闭缓冲）
        location /api/documents/events {
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_request_buffering off;

            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Accel-Buffering "no" always;
        }

        location /api/chat {
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # SSE 关键配置：关闭代理缓冲
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # 禁用 nginx 响应缓冲
            proxy_request_buffering off;

            # 添加 SSE 响应头
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Accel-Buffering "no" always;
        }

        # 后端 Swagger 文档
        location /docs {
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://$backend_upstream;
            proxy_set_header Host $host;
        }
    }
}
